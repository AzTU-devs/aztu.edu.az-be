version: "3.9"

services:
  api-popeyes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-aztu-edu-az
    # --forwarded-allow-ips uses TRUSTED_PROXY_IPS (set in Dockerfile, override
    # in .env if your edge isn't Cloudflare).
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --no-access-log --proxy-headers --forwarded-allow-ips ${TRUSTED_PROXY_IPS}"
    volumes:
      - ./app:/code/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres-app
      - elasticsearch

  postgres-app:
    image: postgres:15-bullseye
    container_name: postgres-aztu-edu-az
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdb:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch-aztu-edu-az
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  pgdb:
  es_data:
