version: "3.9"

services:
  api-popeyes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-aztu-edu-az
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --no-access-log --proxy-headers --forwarded-allow-ips "*"
    volumes:
      - ./app:/code/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres-app

  postgres-app:
    image: postgres:15-bullseye
    container_name: postgres-aztu-edu-az
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdb:/var/lib/postgresql/data

volumes:
  pgdb:
